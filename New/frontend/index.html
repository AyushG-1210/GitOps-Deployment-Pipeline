<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINN Inference Server</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>PINN Inference Interface</h2>
        <div class="badge">Engine: TorchScript Static Graph</div>
        
        <div class="input-group">
            <label for="x">Spatial Coordinate (x)</label>
            <input type="number" id="x" step="0.0001" min="0" max="1" value="0.5">
        </div>
        <div class="input-group">
            <label for="y">Spatial Coordinate (y)</label>
            <input type="number" id="y" step="0.0001" min="0" max="1" value="0.5">
        </div>
        <div class="input-group">
            <label for="t">Temporal Dimension (t)</label>
            <input type="number" id="t" step="0.0001" min="0" max="1" value="0.1">
        </div>
        
        <button onclick="getPrediction()">Compute Inference</button>
        
        <div class="result" id="resultBox">
            <div class="result-title">Predicted Temperature</div>
            <div class="result-value" id="tempValue">0.000000</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
